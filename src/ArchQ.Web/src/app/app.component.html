<app-toast></app-toast>
@if (authService.isLoggedIn()) {
  <div class="app-layout">
    @if (sidebarOpen()) {
      <div class="sidebar-overlay" (click)="toggleSidebar()"></div>
    }
    <aside class="app-sidebar" [class.open]="sidebarOpen()">
      <div class="sidebar-header">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="22" x2="21" y2="22"></line>
          <line x1="6" y1="18" x2="6" y2="11"></line>
          <line x1="10" y1="18" x2="10" y2="11"></line>
          <line x1="14" y1="18" x2="14" y2="11"></line>
          <line x1="18" y1="18" x2="18" y2="11"></line>
          <polygon points="12 2 20 7 4 7"></polygon>
        </svg>
        <span class="logo-text">ArchQ</span>
      </div>
      <div class="sidebar-org">
        <app-org-switcher></app-org-switcher>
      </div>
      <div class="sidebar-nav-section">
        <span class="nav-section-label">NAVIGATION</span>
        <nav class="sidebar-nav">
          <a routerLink="/adrs" routerLinkActive="nav-active" data-testid="nav-adr-records" class="nav-item" (click)="sidebarOpen.set(false)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            ADR Records
          </a>
        </nav>
      </div>
      <div class="sidebar-footer">
        <button
          class="logout-button"
          data-testid="logout-button"
          (click)="onLogout()"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Logout
        </button>
      </div>
    </aside>
    <div class="app-main">
      <div class="app-toolbar">
        <button
          class="hamburger-button"
          data-testid="hamburger-menu"
          (click)="toggleSidebar()"
          aria-label="Toggle menu"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
      <router-outlet />
    </div>
  </div>
} @else {
  <router-outlet />
}
