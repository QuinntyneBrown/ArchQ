name: Deploy Web to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'src/ArchQ.Web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/ArchQ.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/ArchQ.Web
        run: npm ci

      - name: Build production bundle
        working-directory: src/ArchQ.Web
        run: npm run build -- --configuration=production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'src/ArchQ.Web/dist/arch-q.web/browser'
          skip_app_build: true
          skip_api_build: true
